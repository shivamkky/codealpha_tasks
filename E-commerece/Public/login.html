<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to your NovaBuy account">
  <title>Sign In — NovaBuy</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="main-content">
    <div class="auth-page">
      <div class="auth-card">
        <h1>Welcome Back</h1>
        <p class="subtitle">Sign in to your account to continue</p>

        <div id="login-alert" class="alert alert-error"></div>

        <form id="login-form" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="login-email">Email Address</label>
            <input type="email" id="login-email" class="form-control" placeholder="you@example.com" required>
          </div>

          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
          </div>

          <button type="submit" class="btn btn-primary btn-lg" id="login-btn" style="width: 100%;">
            Sign In
          </button>
        </form>

        <p class="form-footer">
          Don't have an account? <a href="/register.html">Create one</a>
        </p>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/navbar.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
