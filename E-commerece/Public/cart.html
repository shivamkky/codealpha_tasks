<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your shopping cart — NovaBuy Premium E-Commerce Store">
  <title>Shopping Cart — NovaBuy</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="main-content">
    <div class="container">
      <div class="cart-page">
        <h1>Shopping Cart</h1>
        <div id="cart-content">
          <!-- Rendered by JS -->
        </div>
      </div>
    </div>

    <footer class="footer">
      <p>© 2025 NovaBuy. All rights reserved. Built with ♥</p>
    </footer>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/navbar.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', renderCart);

    function renderCart() {
      const items = Cart.getItems();
      const container = document.getElementById('cart-content');

      if (items.length === 0) {
        container.innerHTML = `
          <div class="cart-empty">
            <div class="cart-empty-icon">🛒</div>
            <h3>Your cart is empty</h3>
            <p style="color: var(--text-muted); margin-bottom: 24px;">Looks like you haven't added anything yet.</p>
            <a href="/" class="btn btn-primary">Start Shopping</a>
          </div>
        `;
        return;
      }

      const subtotal = Cart.getTotal();
      const tax = subtotal * 0.08;
      const total = subtotal + tax;

      container.innerHTML = `
        <div class="cart-layout">
          <div class="cart-items">
            ${items.map((item, i) => `
              <div class="cart-item" style="animation-delay: ${i * 0.08}s" id="cart-item-${item.id}">
                <div class="cart-item-image">
                  <a href="/product.html?id=${item.id}">
                    <img src="${item.image}" alt="${item.name}"
                         onerror="this.style.display='none'; this.parentElement.innerHTML='<div style=\\'display:flex;align-items:center;justify-content:center;height:100%;font-size:32px;opacity:0.3\\'>📦</div>';">
                  </a>
                </div>
                <div class="cart-item-details">
                  <a href="/product.html?id=${item.id}" class="cart-item-title" style="color: var(--text-primary); text-decoration: none;">${item.name}</a>
                  <span class="cart-item-price">${formatPrice(item.price)}</span>
                  <div class="cart-item-actions">
                    <div class="quantity-controls">
                      <button onclick="updateCartQty(${item.id}, ${item.quantity - 1})">−</button>
                      <input type="number" value="${item.quantity}" min="1" onchange="updateCartQty(${item.id}, parseInt(this.value))" style="width: 50px;">
                      <button onclick="updateCartQty(${item.id}, ${item.quantity + 1})">+</button>
                    </div>
                    <button class="cart-item-remove" onclick="removeCartItem(${item.id})">✕ Remove</button>
                  </div>
                </div>
                <div style="text-align: right; font-weight: 600; white-space: nowrap;">
                  ${formatPrice(item.price * item.quantity)}
                </div>
              </div>
            `).join('')}
          </div>

          <div class="cart-summary">
            <h3>Order Summary</h3>
            <div class="summary-row">
              <span>Subtotal (${Cart.getCount()} items)</span>
              <span>${formatPrice(subtotal)}</span>
            </div>
            <div class="summary-row">
              <span>Shipping</span>
              <span style="color: var(--accent-green);">Free</span>
            </div>
            <div class="summary-row">
              <span>Estimated Tax</span>
              <span>${formatPrice(tax)}</span>
            </div>
            <div class="summary-row total">
              <span>Total</span>
              <span class="amount">${formatPrice(total)}</span>
            </div>
            <a href="${isLoggedIn() ? '/checkout.html' : '/login.html?redirect=/checkout.html'}" class="btn btn-primary btn-lg">
              ${isLoggedIn() ? 'Proceed to Checkout' : 'Sign In to Checkout'}
            </a>
            <a href="/" class="btn btn-secondary" style="width: 100%; margin-top: 8px;">Continue Shopping</a>
          </div>
        </div>
      `;
    }

    function updateCartQty(productId, newQty) {
      if (newQty < 1) {
        removeCartItem(productId);
        return;
      }
      Cart.updateQuantity(productId, newQty);
      renderCart();
    }

    function removeCartItem(productId) {
      Cart.removeItem(productId);
      showToast('Item removed from cart');
      renderCart();
    }
  </script>
</body>
</html>
