<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your NovaBuy account">
  <title>Sign Up — NovaBuy</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="main-content">
    <div class="auth-page">
      <div class="auth-card">
        <h1>Create Account</h1>
        <p class="subtitle">Join NovaBuy for a premium shopping experience</p>

        <div id="register-alert" class="alert alert-error"></div>

        <form id="register-form" onsubmit="handleRegister(event)">
          <div class="form-group">
            <label for="register-name">Full Name</label>
            <input type="text" id="register-name" class="form-control" placeholder="John Doe" required>
          </div>

          <div class="form-group">
            <label for="register-email">Email Address</label>
            <input type="email" id="register-email" class="form-control" placeholder="you@example.com" required>
          </div>

          <div class="form-group">
            <label for="register-password">Password</label>
            <input type="password" id="register-password" class="form-control" placeholder="Minimum 6 characters" required minlength="6">
          </div>

          <div class="form-group">
            <label for="register-confirm">Confirm Password</label>
            <input type="password" id="register-confirm" class="form-control" placeholder="Re-enter your password" required>
          </div>

          <button type="submit" class="btn btn-primary btn-lg" id="register-btn" style="width: 100%;">
            Create Account
          </button>
        </form>

        <p class="form-footer">
          Already have an account? <a href="/login.html">Sign in</a>
        </p>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/navbar.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
